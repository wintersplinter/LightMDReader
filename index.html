<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <meta name="theme-color" content="#111111" />
    <title>LightMDReader</title>
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="brand">
        <span class="dot"></span>
        <span>LightMDReader</span>
      </div>

      <div class="actions">
        <label class="btn">
          Open .md
          <input
            id="fileInput"
            type="file"
            accept=".md,.markdown,text/markdown,text/plain"
            hidden
          />
        </label>

        <button id="exportBtn" class="btn secondary" disabled>
          Export PDF
        </button>
      </div>
    </header>

    <main class="layout">
      <aside class="sidebar">
        <h2>Document</h2>
        <div class="meta">
          <div><span class="k">File:</span> <span id="fileName">—</span></div>
          <div><span class="k">Size:</span> <span id="fileSize">—</span></div>
        </div>

        <h2>Tips</h2>
        <ul class="tips">
          <li>PDF export uses your browser print dialog.</li>
          <li>Install as PWA via “Install app” in your browser menu.</li>
        </ul>
      </aside>

      <section class="content">
        <div id="emptyState" class="empty">
          <h1>Open a Markdown file</h1>
          <p>
            Choose a <code>.md</code> file to preview it. Then export it to PDF.
          </p>
        </div>

        <article id="reader" class="reader" hidden></article>
      </section>
    </main>

    <!-- Markdown renderer -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <!-- Sanitizer -->
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.6/dist/purify.min.js"></script>

    <script src="./app.js"></script>
  </body>
</html>
